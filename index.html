<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 활력 충전! 아침 대반전 사다리 게임</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        #app { width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 20px; box-sizing: border-box; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border-radius: 20px; margin: 20px; }
        h1 { text-align: center; font-size: 24px; text-shadow: 0 0 10px #00f2fe; margin-bottom: 20px; }
        .box { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.2); }
        label { font-size: 14px; font-weight: bold; color: #00f2fe; display: block; margin-bottom: 5px; }
        textarea, input { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid #00f2fe; border-radius: 8px; color: white; font-size: 15px; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,242,254,0.4); }
        button:hover { transform: scale(1.02); }
        #game-screen { text-align: center; }
        canvas { background: rgba(0, 0, 0, 0.4); border-radius: 12px; border: 2px solid #4facfe; display: block; margin: 0 auto 15px auto; }
        .hidden { display: none !important; }
        .result-popup { background: rgba(0,0,0,0.85); border: 2px solid #00f2fe; border-radius: 12px; padding: 15px; margin-top: 15px; text-align: center; }
        #bgm-btn { background: #ff758c; width: auto; font-size: 14px; padding: 5px 10px; float: right; margin-top: -45px; box-shadow: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="setup-screen">
        <h1>🌅 아침 활력 충전 사다리 게임</h1>
        <div class="box">
            <label>참여자 명단 (최소 5명 이상 필요, 쉼표로 구분)</label>
            <textarea id="names-input" rows="3">김팀장, 이대리, 박과장, 최사원, 정주임, 강대리</textarea>
            
            <label>경품 및 벌칙 명단 (참여자 수와 동일하게 쉼표 구분)</label>
            <textarea id="prizes-input" rows="3">☕커피쿠폰, 🚀30분조기퇴근, 💥아침댄스인증, 🍩도넛간식, 💤다음주당직, 🍕피자 선물</textarea>
        </div>
        <button onclick="startGame()">⚡ 흥겨운 게임 시작!</button>
    </div>

    <div id="game-screen" class="hidden">
        <h1>🐛 꿈틀꿈틀 사다리 타기</h1>
        <button id="bgm-btn" onclick="toggleBGM()">🎵 BGM 켜기/끄기</button>
        
        <canvas id="ladder-canvas" width="500" height="500"></canvas>
        <p style="color: #00f2fe; font-weight: bold;">👇 출발할 참여자의 이름을 누르세요!</p>
        <div id="buttons-container"></div>
        
        <div id="result-box" class="result-popup hidden">
            <h2 style="color: #ff3b30; margin: 0 0 10px 0;">🏆 대반전 결과 발표 🏆</h2>
            <p id="result-text" style="font-size: 18px; font-weight: bold;"></p>
            <button onclick="resetGame()" style="background: #666; font-size: 14px; padding: 8px;">다시 세팅하기</button>
        </div>
    </div>
</div>

<script>
    let names = [];
    let prizes = [];
    let linesCount = 0;
    let bridges = [];
    let audioCtx = null;
    let bgmTimeout = null;
    let isBgmPlaying = false;
    let currentNoteIdx = 0;

    const canvas = document.getElementById('ladder-canvas');
    const ctx = canvas.getContext('2d');

    // 🎵 차이콥스키 '호두까기 인형 - 행진곡' 주선율 악보
    const nutcrackerBGM = [
        {f: 392.00, d: 1}, {f: 329.63, d: 1}, {f: 329.63, d: 1}, {f: 329.63, d: 1},
        {f: 392.00, d: 1}, {f: 329.63, d: 1}, {f: 329.63, d: 1}, {f: 329.63, d: 1},
        {f: 392.00, d: 1}, {f: 329.63, d: 1}, {f: 392.00, d: 1}, {f: 329.63, d: 1},
        {f: 523.25, d: 2}, {f: 493.88, d: 1}, {f: 440.00, d: 1},
        {f: 392.00, d: 2}, {f: 369.99, d: 1}, {f: 329.63, d: 1},
        {f: 293.66, d: 4},
        {f: 293.66, d: 1}, {f: 349.23, d: 1}, {f: 440.00, d: 1}, {f: 587.33, d: 1},
        {f: 523.25, d: 2}, {f: 493.88, d: 2}, {f: 440.00, d: 4}
    ];

    function startGame() {
        names = document.getElementById('names-input').value.split(',').map(s => s.trim()).filter(s => s);
        prizes = document.getElementById('prizes-input').value.split(',').map(s => s.trim()).filter(s => s);
        linesCount = names.length;

        if (linesCount < 5) { return alert("난이도 유지를 위해 참여자를 최소 5명 이상 입력해주세요!"); }
        if (linesCount !== prizes.length) { return alert(`참여자 수(${linesCount}명)와 경품 수(${prizes.length}개)가 일치해야 합니다!`); }

        let isValidLadder = false;
        let loopSafety = 0;

        while (!isValidLadder && loopSafety < 1000) {
            loopSafety++;
            bridges = [];

            // 💡 [버그 수정] 글로벌 격리를 없애고 "바로 옆 줄"하고만 겹치지 않게 로컬 격리로 변경!
            for (let i = 0; i < linesCount - 1; i++) {
                let targetBridges = Math.floor(Math.random() * 2) + 7; // 열마다 가로선 7~8개 빽빽하게 생성
                let attempts = 0;
                let colBridgesCount = 0;
                
                while (colBridgesCount < targetBridges && attempts < 200) {
                    attempts++;
                    let y = Math.floor(Math.random() * 370) + 65; 
                    
                    // 현재 줄(i)과 바로 왼쪽 줄(i-1)의 선들과만 Y축이 15px 이상 떨어지면 합격 (공간 낭비 방지)
                    let isConflict = bridges.some(b => 
                        (b.fromIdx === i || b.fromIdx === i - 1) && Math.abs(b.y - y) < 15
                    );
                    
                    if (!isConflict) {
                        bridges.push({ fromIdx: i, toIdx: i + 1, y: y });
                        colBridgesCount++;
                    }
                }
            }
            bridges.sort((a, b) => a.y - b.y);

            // 가로선 6번 이상, 세로선 5번 이상 검증 로직
            isValidLadder = true;
            for (let start = 0; start < linesCount; start++) {
                let currLine = start;
                let horizontalCount = 0;
                let visitedLines = new Set([currLine]);

                for (let testY = 50; testY < 450; testY++) {
                    let b = bridges.find(br => br.y === testY && (br.fromIdx === currLine || br.toIdx === currLine));
                    if (b) {
                        horizontalCount++;
                        currLine = (b.fromIdx === currLine) ? b.toIdx : b.fromIdx;
                        visitedLines.add(currLine);
                        testY += 4; 
                    }
                }
                
                if (horizontalCount < 6 || visitedLines.size < 5) {
                    isValidLadder = false;
                    break; // 하나라도 불합격이면 사다리 폭파 후 재배치
                }
            }
        }

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        startBGM();
        initGameUI();
    }

    function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const colWidth = canvas.width / (linesCount + 1);

        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 4;
        for (let i = 0; i < linesCount; i++) {
            let x = colWidth * (i + 1);
            ctx.beginPath(); ctx.moveTo(x, 50); ctx.lineTo(x, 450); ctx.stroke();
            
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 14px Pretendard"; ctx.textAlign = "center";
            ctx.fillText(names[i], x, 40);
            ctx.fillStyle = "#00f2fe"; ctx.font = "13px Pretendard";
            ctx.fillText(prizes[i], x, 475);
        }

        ctx.strokeStyle = "#4facfe"; ctx.lineWidth = 4;
        bridges.forEach(b => {
            let x1 = colWidth * (b.fromIdx + 1);
            let x2 = colWidth * (b.toIdx + 1);
            ctx.beginPath(); ctx.moveTo(x1, b.y); ctx.lineTo(x2, b.y); ctx.stroke();
        });
    }

    function initGameUI() {
        drawBoard();
        const container = document.getElementById('buttons-container');
        container.innerHTML = '';
        names.forEach((name, idx) => {
            const btn = document.createElement('button');
            btn.innerText = `${name} 출발!`;
            btn.style.width = 'auto'; btn.style.margin = '5px'; btn.style.fontSize = '14px';
            btn.onclick = () => playFixedTenSeconds(idx, btn);
            container.appendChild(btn);
        });
    }

    // 💡 10초 주행 애니메이션
    function playFixedTenSeconds(startIdx, btnElement) {
        btnElement.disabled = true;
        btnElement.style.background = '#444';
        
        const colWidth = canvas.width / (linesCount + 1);
        let currLine = startIdx;
        let y = 50;
        let lastBridgeY = 0;
        let preCalculatedPath = [];
        let tick = 0;

        while (y < 450) {
            y += 0.5;
            let yInt = Math.floor(y);
            let b = (yInt !== lastBridgeY) ? bridges.find(br => br.y === yInt && (br.fromIdx === currLine || br.toIdx === currLine)) : null;

            if (b) {
                // 갈림길 멈춤 및 도리도리 모션
                for (let f = 0; f < 35; f++) {
                    let angle = Math.sin(f * 0.25) * 0.55; 
                    preCalculatedPath.push({ x: colWidth * (currLine + 1), y: b.y, angle: angle, tone: (f === 0 ? 320 : 0) });
                }
                // 가로 건너가기 모션
                let targetLine = (b.fromIdx === currLine) ? b.toIdx : b.fromIdx;
                let startX = colWidth * (currLine + 1);
                let endX = colWidth * (targetLine + 1);
                for (let f = 0; f <= 35; f++) {
                    let t = f / 35;
                    let cx = startX + (endX - startX) * t;
                    let angle = Math.sin(f * 0.2) * 0.1;
                    preCalculatedPath.push({ x: cx, y: b.y, angle: angle, tone: 0 });
                }
                currLine = targetLine;
                y = b.y + 4;
                lastBridgeY = b.y;
            } else {
                let angle = Math.sin(tick * 0.12) * 0.12;
                preCalculatedPath.push({ x: colWidth * (currLine + 1), y: y, angle: angle, tone: 0 });
                tick++;
            }
        }

        // 경로가 아무리 복잡해도 600프레임(약 10초)에 맞춰 주파하도록 프레임 압축/확장
        let currentStep = 0;
        const totalTargetFrames = 600; 
        const stepIncrement = preCalculatedPath.length / totalTargetFrames;

        function renderFrame() {
            if (currentStep < preCalculatedPath.length) {
                drawBoard();
                let node = preCalculatedPath[Math.floor(currentStep)];
                
                if (node.tone > 0) playTone(node.tone, 0.08);

                ctx.save();
                ctx.translate(node.x, node.y);
                ctx.rotate(node.angle);
                ctx.font = "26px Pretendard"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("🐛", 0, 0);
                ctx.restore();

                currentStep += stepIncrement; 
                requestAnimationFrame(renderFrame);
            } else {
                playTone(523.25, 0.1); 
                setTimeout(() => playTone(659.25, 0.1), 80);
                setTimeout(() => playTone(783.99, 0.25), 160); 
                document.getElementById('result-box').classList.remove('hidden');
                document.getElementById('result-text').innerHTML += `🎯 <b>[${names[startIdx]}]</b> 님 ➡️ <b>[${prizes[currLine]}]</b> 당첨!!<br>`;
            }
        }
        renderFrame();
    }

    function playTone(freq, duration) {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'square'; 
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.04, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function startBGM() {
        if(isBgmPlaying) return;
        isBgmPlaying = true;
        currentNoteIdx = 0;
        playBgmStep();
    }

    function playBgmStep() {
        if (!isBgmPlaying) return;
        let note = nutcrackerBGM[currentNoteIdx % nutcrackerBGM.length];
        playTone(note.f, note.d * 0.15); 
        currentNoteIdx++;
        bgmTimeout = setTimeout(playBgmStep, note.d * 185);
    }

    function toggleBGM() {
        if (isBgmPlaying) {
            clearTimeout(bgmTimeout); isBgmPlaying = false;
        } else {
            startBGM();
        }
    }

    function resetGame() {
        clearTimeout(bgmTimeout); isBgmPlaying = false;
        document.getElementById('result-text').innerText = '';
        document.getElementById('result-box').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('hidden');
    }
</script>
</body>
</html>
