<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 활력 충전! 아침 대반전 사다리 게임</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        #app { width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 20px; box-sizing: border-box; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border-radius: 20px; margin: 20px; }
        h1 { text-align: center; font-size: 24px; text-shadow: 0 0 10px #00f2fe; margin-bottom: 20px; }
        .box { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.2); }
        label { font-size: 14px; font-weight: bold; color: #00f2fe; display: block; margin-bottom: 5px; }
        textarea, input { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid #00f2fe; border-radius: 8px; color: white; font-size: 15px; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,242,254,0.4); }
        button:hover { transform: scale(1.02); }
        #game-screen { text-align: center; }
        canvas { background: rgba(0, 0, 0, 0.4); border-radius: 12px; border: 2px solid #4facfe; display: block; margin: 0 auto 15px auto; }
        .hidden { display: none !important; }
        .result-popup { background: rgba(0,0,0,0.85); border: 2px solid #00f2fe; border-radius: 12px; padding: 15px; margin-top: 15px; text-align: center; }
        #bgm-btn { background: #ff758c; width: auto; font-size: 14px; padding: 5px 10px; float: right; margin-top: -45px; box-shadow: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="setup-screen">
        <h1>🌅 아침 활력 충전 사다리 게임</h1>
        <div class="box">
            <label>참여자 명단 (쉼표로 구분)</label>
            <textarea id="names-input" rows="3">김팀장, 이대리, 박과장, 최사원, 정주임</textarea>
            
            <label>경품 및 벌칙 명단 (참여자 수와 동일하게 쉼표 구분)</label>
            <textarea id="prizes-input" rows="3">☕커피쿠폰, 🚀30분조기퇴근, 💥아침댄스인증, 🍩도넛간식, 💤다음주당직</textarea>
        </div>
        <button onclick="startGame()">⚡ 흥겨운 게임 시작!</button>
    </div>

    <div id="game-screen" class="hidden">
        <h1>🐛 꿈틀꿈틀 사다리 타기</h1>
        <button id="bgm-btn" onclick="toggleBGM()">🎵 BGM 켜기/끄기</button>
        
        <canvas id="ladder-canvas" width="500" height="400"></canvas>
        <p style="color: #00f2fe; font-weight: bold;">👇 출발할 참여자의 이름을 누르세요!</p>
        <div id="buttons-container"></div>
        
        <div id="result-box" class="result-popup hidden">
            <h2 style="color: #ff3b30; margin: 0 0 10px 0;">🏆 대반전 결과 발표 🏆</h2>
            <p id="result-text" style="font-size: 18px; font-weight: bold;"></p>
            <button onclick="resetGame()" style="background: #666; font-size: 14px; padding: 8px;">다시 세팅하기</button>
        </div>
    </div>
</div>

<script>
    let names = [];
    let prizes = [];
    let linesCount = 0;
    let bridges = [];
    let audioCtx = null;
    let bgmTimeout = null;
    let isBgmPlaying = false;
    let currentNoteIdx = 0;

    const canvas = document.getElementById('ladder-canvas');
    const ctx = canvas.getContext('2d');

    const tetrisBGM = [
        {f: 659.25, d: 2}, {f: 493.88, d: 1}, {f: 523.25, d: 1}, {f: 587.33, d: 2}, {f: 523.25, d: 1}, {f: 493.88, d: 1},
        {f: 440.00, d: 2}, {f: 440.00, d: 1}, {f: 523.25, d: 1}, {f: 659.25, d: 2}, {f: 587.33, d: 1}, {f: 523.25, d: 1},
        {f: 493.88, d: 3}, {f: 523.25, d: 1}, {f: 587.33, d: 2}, {f: 659.25, d: 2},
        {f: 523.25, d: 2}, {f: 440.00, d: 2}, {f: 440.00, d: 4},

        {f: 587.33, d: 3}, {f: 698.46, d: 1}, {f: 880.00, d: 2}, {f: 783.99, d: 1}, {f: 698.46, d: 1},
        {f: 659.25, d: 3}, {f: 523.25, d: 1}, {f: 659.25, d: 2}, {f: 587.33, d: 1}, {f: 523.25, d: 1},
        {f: 493.88, d: 2}, {f: 493.88, d: 1}, {f: 523.25, d: 1}, {f: 587.33, d: 2}, {f: 659.25, d: 2},
        {f: 523.25, d: 2}, {f: 440.00, d: 2}, {f: 440.00, d: 4}
    ];

    function startGame() {
        names = document.getElementById('names-input').value.split(',').map(s => s.trim()).filter(s => s);
        prizes = document.getElementById('prizes-input').value.split(',').map(s => s.trim()).filter(s => s);
        linesCount = names.length;

        if (linesCount < 2) { return alert("참여자를 최소 2명 이상 입력해주세요!"); }
        if (linesCount !== prizes.length) { return alert(`참여자 수(${linesCount}명)와 경품 수(${prizes.length}개)가 일치해야 합니다!`); }

        // 💡 [알고리즘 전면 개조] 어떤 세로칸이든 가로선 간의 글로벌 Y축 높이 차이를 최소 25px 이상 강제 격리 보장
        bridges = [];
        let globalYPositions = [];
        
        for (let i = 0; i < linesCount - 1; i++) {
            let columnBridges = 0;
            let targetBridges = Math.floor(Math.random() * 2) + 3; // 라인당 가로선 3~4개 균형 생성
            let maxAttempts = 200; // 무한루프 방지용 스로틀링
            
            while (columnBridges < targetBridges && maxAttempts > 0) {
                maxAttempts--;
                let y = Math.floor(Math.random() * 220) + 90; // 안전 스크롤 영역 내 Y 값 임의 지정
                
                // 옆 라인이든 어디든 전체 사다리판 중에서 상하 높이차가 25픽셀 미만인 겹침이 전혀 없을 때만 최종 확정
                if (!globalYPositions.some(existingY => Math.abs(existingY - y) < 25)) {
                    globalYPositions.push(y);
                    bridges.push({ fromIdx: i, toIdx: i + 1, y: y });
                    columnBridges++;
                }
            }
        }

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        startBGM();
        initGameUI();
    }

    function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const colWidth = canvas.width / (linesCount + 1);

        ctx.strokeStyle = "rgba(255,255,255,0.5)";
        ctx.lineWidth = 4;
        for (let i = 0; i < linesCount; i++) {
            let x = colWidth * (i + 1);
            ctx.beginPath(); ctx.moveTo(x, 50); ctx.lineTo(x, 350); ctx.stroke();
            
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 14px Pretendard"; ctx.textAlign = "center";
            ctx.fillText(names[i], x, 40);
            
            ctx.fillStyle = "#00f2fe"; ctx.font = "13px Pretendard";
            ctx.fillText(prizes[i], x, 375);
        }

        ctx.strokeStyle = "#4facfe"; ctx.lineWidth = 4;
        bridges.forEach(b => {
            let x1 = colWidth * (b.fromIdx + 1);
            let x2 = colWidth * (b.toIdx + 1);
            ctx.beginPath(); ctx.moveTo(x1, b.y); ctx.lineTo(x2, b.y); ctx.stroke();
        });
    }

    function initGameUI() {
        drawBoard();
        const container = document.getElementById('buttons-container');
        container.innerHTML = '';
        names.forEach((name, idx) => {
            const btn = document.createElement('button');
            btn.innerText = `${name} 출발!`;
            btn.style.width = 'auto'; btn.style.margin = '5px'; btn.style.fontSize = '14px';
            btn.onclick = () => animateWormUltraSlow(idx, btn);
            container.appendChild(btn);
        });
    }

    function animateWormUltraSlow(startIdx, btnElement) {
        btnElement.disabled = true;
        btnElement.style.background = '#444';
        
        const colWidth = canvas.width / (linesCount + 1);
        let currentLine = startIdx;
        let y = 50;
        
        let state = 'DOWN';
        let lookTimer = 0;
        let crossProgress = 0;
        let activeBridge = null;
        let lastBridgeY = 0;
        
        let wormAngle = 0;
        let tick = 0;

        function walk() {
            tick++;
            let currentX = colWidth * (currentLine + 1);
            
            if (y < 350) {
                if (state === 'DOWN') {
                    y += 0.35; 
                    wormAngle = Math.sin(tick * 0.05) * 0.12; 
                    
                    let currentYInt = Math.floor(y);
                    if (currentYInt !== lastBridgeY) {
                        let bridge = bridges.find(b => b.y === currentYInt && (b.fromIdx === currentLine || b.toIdx === currentLine));
                        if (bridge) {
                            playTone(300, 0.1); 
                            state = 'LOOKING';
                            lookTimer = 110; 
                            activeBridge = bridge;
                            lastBridgeY = currentYInt;
                        }
                    }
                } 
                else if (state === 'LOOKING') {
                    wormAngle = Math.sin(lookTimer * 0.12) * 0.6; 
                    lookTimer--;
                    if (lookTimer <= 0) {
                        state = 'CROSSING';
                        crossProgress = 0;
                    }
                } 
                else if (state === 'CROSSING') {
                    crossProgress += 0.005; 
                    wormAngle = Math.sin(tick * 0.15) * 0.08;
                    
                    let targetLine = (activeBridge.fromIdx === currentLine) ? activeBridge.toIdx : activeBridge.fromIdx;
                    let startX = colWidth * (currentLine + 1);
                    let endX = colWidth * (targetLine + 1);
                    
                    currentX = startX + (endX - startX) * crossProgress;
                    
                    if (crossProgress >= 1) {
                        currentLine = targetLine;
                        state = 'DOWN';
                        y += 3; 
                    }
                }

                drawBoard();
                ctx.save();
                ctx.translate(currentX, y);
                ctx.rotate(wormAngle);
                ctx.font = "26px Pretendard"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("🐛", 0, 0);
                ctx.restore();

                requestAnimationFrame(walk);
            } else {
                playTone(523.25, 0.1); 
                setTimeout(() => playTone(659.25, 0.1), 80);
                setTimeout(() => playTone(783.99, 0.3), 160); 
                document.getElementById('result-box').classList.remove('hidden');
                document.getElementById('result-text').innerHTML += `🎯 <b>[${names[startIdx]}]</b> 님 ➡️ <b>[${prizes[currentLine]}]</b> 당첨!!<br>`;
            }
        }
        walk();
    }

    function playTone(freq, duration) {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'square'; 
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.04, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function startBGM() {
        if(isBgmPlaying) return;
        isBgmPlaying = true;
        currentNoteIdx = 0;
        playBgmStep();
    }

    function playBgmStep() {
        if (!isBgmPlaying) return;
        let note = tetrisBGM[currentNoteIdx % tetrisBGM.length];
        playTone(note.f, note.d * 0.12); 
        currentNoteIdx++;
        bgmTimeout = setTimeout(playBgmStep, note.d * 145);
    }

    function toggleBGM() {
        if (isBgmPlaying) {
            clearTimeout(bgmTimeout); isBgmPlaying = false;
        } else {
            startBGM();
        }
    }

    function resetGame() {
        clearTimeout(bgmTimeout); isBgmPlaying = false;
        document.getElementById('result-text').innerText = '';
        document.getElementById('result-box').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('hidden');
    }
</script>
</body>
</html>
